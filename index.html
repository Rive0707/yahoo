<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JP News English Reader</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Sans+JP:wght@300;400;500&display=swap');

:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #22263a;
  --accent: #6c8eff;
  --accent2: #a78bfa;
  --text: #e8eaf0;
  --muted: #7b82a0;
  --border: #2a2f45;
  --warn: #fbbf24;
  --yahoo: #ff0033;
  --nhk: #1a6fc4;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── HEADER ── */
header {
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: 10px;
}
.logo { font-size: 16px; font-weight: 600; letter-spacing: -0.3px; }
.logo span { color: var(--accent); }
#backBtn {
  display: none; margin-left: auto;
  background: var(--surface2); color: var(--muted);
  border: 1px solid var(--border); padding: 6px 14px;
  border-radius: 8px; cursor: pointer; font-size: 13px;
  font-family: 'Inter', sans-serif; transition: all .2s;
}
#backBtn:hover { color: var(--text); border-color: var(--accent); }

/* ── SOURCE TABS ── */
.source-tabs {
  display: flex; border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.src-btn {
  flex: 1; padding: 12px 0; font-size: 13px; font-weight: 500;
  font-family: 'Inter', sans-serif;
  background: none; border: none; color: var(--muted);
  cursor: pointer; transition: all .2s;
  border-bottom: 2px solid transparent;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.src-btn .src-dot {
  width: 7px; height: 7px; border-radius: 50%;
}
.src-btn[data-src="yahoo"] .src-dot { background: var(--yahoo); }
.src-btn[data-src="nhk"] .src-dot { background: var(--nhk); }
.src-btn.active { color: var(--text); border-bottom-color: var(--accent); }

/* ── CATEGORY TABS ── */
.cat-scroll {
  overflow-x: auto; padding: 12px 16px; gap: 8px;
  display: flex; background: var(--bg);
  border-bottom: 1px solid var(--border);
  scrollbar-width: none;
}
.cat-scroll::-webkit-scrollbar { display: none; }
.cat-btn {
  white-space: nowrap; background: var(--surface);
  border: 1px solid var(--border); color: var(--muted);
  padding: 6px 14px; border-radius: 20px; cursor: pointer;
  font-size: 12px; font-family: 'Inter', sans-serif; transition: all .2s;
  flex-shrink: 0;
}
.cat-btn.active, .cat-btn:hover {
  background: var(--accent); color: #fff; border-color: var(--accent);
}

/* ── CONTAINER ── */
.container { max-width: 800px; margin: 0 auto; padding: 20px 16px; }

/* ── NEWS CARDS ── */
#newsList { display: flex; flex-direction: column; gap: 10px; }
.news-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 16px 18px;
  cursor: pointer; transition: all .2s;
  display: flex; gap: 14px; align-items: flex-start;
}
.news-card:hover {
  border-color: var(--accent); background: var(--surface2);
  transform: translateY(-1px);
}
.news-num { font-size: 11px; color: var(--accent); font-weight: 600; min-width: 22px; padding-top: 2px; }
.news-content { flex: 1; }
.news-title-jp { font-family: 'Noto Sans JP', sans-serif; font-size: 12px; color: var(--muted); margin-bottom: 5px; line-height: 1.5; }
.news-title-en { font-size: 15px; font-weight: 500; line-height: 1.5; }
.news-meta { margin-top: 6px; font-size: 11px; color: var(--muted); }
.news-arrow { color: var(--muted); font-size: 18px; padding-top: 2px; transition: transform .2s; }
.news-card:hover .news-arrow { transform: translateX(4px); color: var(--accent); }

/* ── LOADING ── */
.loading { text-align: center; padding: 40px; color: var(--muted); }
.spinner {
  width: 32px; height: 32px; border: 3px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin .8s linear infinite; margin: 0 auto 14px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── ARTICLE ── */
#articleView { display: none; }
.art-header { margin-bottom: 24px; padding-bottom: 18px; border-bottom: 1px solid var(--border); }
.art-title-en { font-size: 22px; font-weight: 600; line-height: 1.4; margin-bottom: 8px; letter-spacing: -0.3px; }
.art-title-jp { font-family: 'Noto Sans JP', sans-serif; font-size: 13px; color: var(--muted); line-height: 1.6; }
.art-date { font-size: 11px; color: var(--muted); margin-top: 6px; }
.art-source { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); margin-top: 6px; }
.art-source-dot { width: 6px; height: 6px; border-radius: 50%; }

/* ── TRANSLATION TOGGLE BAR ── */
.jp-toggle-bar {
  display: flex; align-items: center; gap: 12px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; padding: 11px 15px; margin-bottom: 20px;
}
.jp-toggle-bar label:first-child { font-size: 13px; color: var(--muted); flex: 1; }
.toggle { position: relative; width: 40px; height: 22px; cursor: pointer; }
.toggle input { display: none; }
.t-track { width: 40px; height: 22px; background: var(--border); border-radius: 11px; display: block; transition: background .2s; }
.toggle input:checked + .t-track { background: var(--accent); }
.t-thumb { position: absolute; top: 3px; left: 3px; width: 16px; height: 16px; background: #fff; border-radius: 50%; transition: left .2s; pointer-events: none; }
.toggle input:checked ~ .t-thumb { left: 21px; }

/* ── ARTICLE BODY ── */
#articleBody { line-height: 1.9; }
.para-block { margin-bottom: 22px; }
.en-para { font-size: 15px; line-height: 1.9; color: var(--text); }
.jp-para {
  font-family: 'Noto Sans JP', sans-serif; font-size: 12px;
  color: var(--muted); line-height: 1.8; margin-top: 7px;
  padding: 9px 13px; background: var(--surface2);
  border-left: 3px solid var(--accent2); border-radius: 0 8px 8px 0;
  display: none;
}
.jp-para.visible { display: block; }

/* ── WORD ── */
.word { cursor: pointer; border-bottom: 1px dashed transparent; transition: all .15s; border-radius: 2px; padding: 0 1px; }
.word:hover { background: rgba(108,142,255,.15); border-bottom-color: var(--accent); color: #fff; }
.word.looked-up { border-bottom-color: var(--accent2); color: var(--accent2); }

/* ── TOOLTIP ── */
#tooltip {
  position: fixed; background: #1e2235; border: 1px solid var(--accent);
  border-radius: 10px; padding: 10px 14px; font-size: 13px;
  max-width: 200px; z-index: 9999; display: none;
  box-shadow: 0 8px 32px rgba(0,0,0,.4); pointer-events: none;
}
#tt-word { font-weight: 600; color: var(--text); margin-bottom: 3px; }
#tt-jp { color: var(--accent2); font-family: 'Noto Sans JP', sans-serif; font-size: 14px; }

/* ── NOTICE ── */
.notice {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; padding: 14px 18px; font-size: 13px;
  color: var(--muted); margin-bottom: 18px; line-height: 1.6;
}
.notice strong { color: var(--warn); }
.retry-btn {
  background: var(--accent); color: #fff; border: none;
  padding: 8px 18px; border-radius: 8px; cursor: pointer;
  font-size: 13px; margin-top: 10px; font-family: 'Inter', sans-serif;
}

/* ── HINT ── */
.hint { font-size: 12px; color: var(--muted); margin-bottom: 18px; }
.hint strong { color: var(--accent); }

/* ── STATUS ── */
#statusBar {
  position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 24px; padding: 9px 18px; font-size: 12px;
  color: var(--muted); display: none; z-index: 200;
  box-shadow: 0 4px 20px rgba(0,0,0,.4); white-space: nowrap;
}
</style>
</head>
<body>

<header>
  <div class="logo">JP News <span>EN</span> Reader</div>
  <button id="backBtn" onclick="showList()">← 一覧</button>
</header>

<!-- SOURCE TABS -->
<div class="source-tabs" id="sourceTabs">
  <button class="src-btn active" data-src="yahoo" onclick="switchSource('yahoo')">
    <span class="src-dot"></span> Yahoo! ニュース
  </button>
  <button class="src-btn" data-src="nhk" onclick="switchSource('nhk')">
    <span class="src-dot"></span> 読売新聞
  </button>
</div>

<!-- CATEGORY TABS -->
<div class="cat-scroll" id="catTabs"></div>

<div class="container">
  <!-- LIST VIEW -->
  <div id="listView">
    <div id="newsList">
      <div class="loading"><div class="spinner"></div>読み込み中...</div>
    </div>
  </div>

  <!-- ARTICLE VIEW -->
  <div id="articleView">
    <div class="art-header">
      <div class="art-title-en" id="artTitleEn"></div>
      <div class="art-title-jp" id="artTitleJp"></div>
      <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap">
        <div class="art-date" id="artDate"></div>
        <div class="art-source" id="artSource"></div>
      </div>
    </div>

    <div class="jp-toggle-bar">
      <label>和訳を段落ごとに表示</label>
      <label class="toggle">
        <input type="checkbox" id="jpToggle" onchange="toggleJpAll()">
        <span class="t-track"></span>
        <span class="t-thumb"></span>
      </label>
    </div>

    <div class="hint">💡 <strong>単語をタップ</strong>すると日本語訳が出ます</div>
    <div id="articleBody"></div>
  </div>
</div>

<div id="tooltip">
  <div id="tt-word"></div>
  <div id="tt-jp"></div>
</div>
<div id="statusBar"></div>

<script>
// ══════════════════════════════
// DATA SOURCES
// ══════════════════════════════
const SOURCES = {
  yahoo: {
    name: 'Yahoo! ニュース',
    color: '#ff0033',
    categories: [
      { label: 'トップ',       rss: 'https://news.yahoo.co.jp/rss/topics/top-picks.xml' },
      { label: '国内',         rss: 'https://news.yahoo.co.jp/rss/topics/domestic.xml' },
      { label: '国際',         rss: 'https://news.yahoo.co.jp/rss/topics/world.xml' },
      { label: 'ビジネス',     rss: 'https://news.yahoo.co.jp/rss/topics/business.xml' },
      { label: 'テクノロジー', rss: 'https://news.yahoo.co.jp/rss/topics/it.xml' },
      { label: 'スポーツ',     rss: 'https://news.yahoo.co.jp/rss/topics/sports.xml' },
      { label: 'エンタメ',     rss: 'https://news.yahoo.co.jp/rss/topics/entertainment.xml' },
    ]
  },
  nhk: {
    name: 'NHK ニュース',
    color: '#1a6fc4',
    categories: [
      { label: 'トップ',   rss: 'https://www3.nhk.or.jp/rss/news/cat0.xml' },
      { label: '社会',     rss: 'https://www3.nhk.or.jp/rss/news/cat1.xml' },
      { label: '科学',     rss: 'https://www3.nhk.or.jp/rss/news/cat3.xml' },
      { label: '政治',     rss: 'https://www3.nhk.or.jp/rss/news/cat4.xml' },
      { label: '経済',     rss: 'https://www3.nhk.or.jp/rss/news/cat5.xml' },
      { label: '国際',     rss: 'https://www3.nhk.or.jp/rss/news/cat6.xml' },
      { label: 'スポーツ', rss: 'https://www3.nhk.or.jp/rss/news/cat7.xml' },
      { label: '文化',     rss: 'https://www3.nhk.or.jp/rss/news/cat2.xml' },
    ]
  }
};

// ══════════════════════════════
// PROXY
// ══════════════════════════════
const PROXIES = [
  'https://corsproxy.io/?',
  'https://api.allorigins.win/raw?url=',
  'https://thingproxy.freeboard.io/fetch/',
];
let proxyIndex = 0;

async function fetchWithProxy(url) {
  for (let i = 0; i < PROXIES.length; i++) {
    try {
      const proxy = PROXIES[(proxyIndex + i) % PROXIES.length];
      const res = await fetch(proxy + encodeURIComponent(url), { signal: AbortSignal.timeout(9000) });
      if (res.ok) { proxyIndex = (proxyIndex + i) % PROXIES.length; return res; }
    } catch(e) {}
  }
  throw new Error('全プロキシ接続失敗。少し待って再試行してください。');
}

// ══════════════════════════════
// TRANSLATE (MyMemory)
// ══════════════════════════════
const MYMEMORY = 'https://api.mymemory.translated.net/get';
const tCache = {};

async function translate(text, from='ja', to='en') {
  const key = `${from}|${to}|${text}`;
  if (tCache[key]) return tCache[key];
  if (text.length > 480) {
    const parts = splitText(text, 480);
    const results = await Promise.all(parts.map(p => translate(p, from, to)));
    return tCache[key] = results.join(' ');
  }
  try {
    const r = await fetch(`${MYMEMORY}?q=${encodeURIComponent(text)}&langpair=${from}|${to}`);
    const d = await r.json();
    return tCache[key] = d?.responseData?.translatedText || text;
  } catch { return tCache[key] = text; }
}

function splitText(text, max) {
  const chunks = []; let s = 0;
  while (s < text.length) {
    let e = Math.min(s + max, text.length);
    if (e < text.length) {
      const b = Math.max(text.lastIndexOf('。', e), text.lastIndexOf(' ', e));
      if (b > s) e = b + 1;
    }
    chunks.push(text.slice(s, e)); s = e;
  }
  return chunks;
}

// ══════════════════════════════
// STATE
// ══════════════════════════════
let currentSrc = 'yahoo';
let currentCat = 0;
let articles = [];
const wordCache = {};

// ══════════════════════════════
// INIT
// ══════════════════════════════
window.onload = () => {
  buildCatTabs('yahoo');
  loadRSS();
};

// ══════════════════════════════
// SOURCE SWITCH
// ══════════════════════════════
function switchSource(src) {
  if (currentSrc === src) return;
  currentSrc = src;
  currentCat = 0;
  document.querySelectorAll('.src-btn').forEach(b => b.classList.toggle('active', b.dataset.src === src));
  buildCatTabs(src);
  loadRSS();
}

// ══════════════════════════════
// CAT TABS
// ══════════════════════════════
function buildCatTabs(src) {
  const bar = document.getElementById('catTabs');
  bar.innerHTML = '';
  SOURCES[src].categories.forEach((cat, i) => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (i === 0 ? ' active' : '');
    btn.textContent = cat.label;
    btn.onclick = () => {
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentCat = i;
      loadRSS();
    };
    bar.appendChild(btn);
  });
}

// ══════════════════════════════
// RSS LOAD
// ══════════════════════════════
async function loadRSS() {
  const list = document.getElementById('newsList');
  list.innerHTML = '<div class="loading"><div class="spinner"></div>読み込み中...</div>';
  articles = [];

  const cat = SOURCES[currentSrc].categories[currentCat];
  try {
    const res = await fetchWithProxy(cat.rss);
    const text = await res.text();
    const xml = new DOMParser().parseFromString(text, 'text/xml');
    const items = xml.querySelectorAll('item');
    const raw = Array.from(items).slice(0, 12).map(item => ({
      titleJp: item.querySelector('title')?.textContent?.replace(/<!\[CDATA\[|\]\]>/g,'').trim() || '',
      link: item.querySelector('link')?.textContent?.trim() || '',
      pubDate: item.querySelector('pubDate')?.textContent || '',
      description: item.querySelector('description')?.textContent?.replace(/<[^>]+>/g,'').trim() || '',
    }));

    list.innerHTML = '<div class="loading"><div class="spinner"></div>タイトルを英訳中...</div>';
    articles = await Promise.all(raw.map(async (a, i) => ({
      ...a, titleEn: await translate(a.titleJp), index: i
    })));
    renderList();
  } catch(e) {
    list.innerHTML = `<div class="notice"><strong>⚠️ 読み込み失敗</strong><br>${e.message}<br>
      <button class="retry-btn" onclick="loadRSS()">🔄 再試行</button></div>`;
  }
}

function renderList() {
  const list = document.getElementById('newsList');
  list.innerHTML = '';
  articles.forEach((a, i) => {
    const date = a.pubDate ? new Date(a.pubDate).toLocaleDateString('ja-JP',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '';
    const card = document.createElement('div');
    card.className = 'news-card';
    card.innerHTML = `
      <div class="news-num">${String(i+1).padStart(2,'0')}</div>
      <div class="news-content">
        <div class="news-title-jp">${esc(a.titleJp)}</div>
        <div class="news-title-en">${esc(a.titleEn)}</div>
        <div class="news-meta">📅 ${date}</div>
      </div>
      <div class="news-arrow">›</div>`;
    card.onclick = () => openArticle(i);
    list.appendChild(card);
  });
}

// ══════════════════════════════
// ARTICLE
// ══════════════════════════════
async function openArticle(idx) {
  const a = articles[idx];
  document.getElementById('listView').style.display = 'none';
  document.getElementById('articleView').style.display = 'block';
  document.getElementById('backBtn').style.display = 'block';
  document.getElementById('jpToggle').checked = false;
  document.getElementById('artTitleEn').textContent = a.titleEn;
  document.getElementById('artTitleJp').textContent = a.titleJp;
  document.getElementById('artDate').textContent = a.pubDate ? new Date(a.pubDate).toLocaleString('ja-JP') : '';
  const src = SOURCES[currentSrc];
  document.getElementById('artSource').innerHTML = `<span class="art-source-dot" style="background:${src.color}"></span>${src.name}`;
  document.getElementById('articleBody').innerHTML = '<div class="loading"><div class="spinner"></div>記事取得・翻訳中...</div>';
  window.scrollTo(0,0);

  try {
    const res = await fetchWithProxy(a.link);
    const html = await res.text();
    const doc = new DOMParser().parseFromString(html, 'text/html');

    let paras = [];
    const selectors = ['.article_body p','.articleBody p','[class*="article"] p','article p','.paragraph p','p'];
    for (const sel of selectors) {
      const els = doc.querySelectorAll(sel);
      const texts = Array.from(els).map(el => el.textContent.trim())
        .filter(t => t.length > 20 && !t.match(/続きを読む|広告|cookie|Cookie|javascript|JavaScript/i));
      if (texts.length > 0) { paras = texts.slice(0, 18); break; }
    }
    if (paras.length === 0 && a.description) paras = [a.description];
    if (paras.length === 0) throw new Error('記事本文が取得できませんでした');

    showStatus(`翻訳中 0/${paras.length}`);
    const translated = [];
    for (let i = 0; i < paras.length; i++) {
      translated.push({ jp: paras[i], en: await translate(paras[i]) });
      showStatus(`翻訳中 ${i+1}/${paras.length}`);
    }
    hideStatus();
    renderArticle(translated);
  } catch(e) {
    hideStatus();
    document.getElementById('articleBody').innerHTML =
      `<div class="notice"><strong>⚠️ 取得失敗</strong><br>${e.message}</div>`;
  }
}

function renderArticle(paras) {
  const body = document.getElementById('articleBody');
  body.innerHTML = '';
  paras.forEach((p) => {
    const block = document.createElement('div');
    block.className = 'para-block';
    const enDiv = document.createElement('div');
    enDiv.className = 'en-para';
    enDiv.innerHTML = clickableWords(p.en);
    const jpDiv = document.createElement('div');
    jpDiv.className = 'jp-para';
    jpDiv.textContent = p.jp;
    block.append(enDiv, jpDiv);
    body.appendChild(block);
  });
  body.addEventListener('click', onWordClick);
}

function clickableWords(text) {
  return text.replace(/([a-zA-Z']+)/g, m => {
    if (m.replace(/'/g,'').length < 2) return m;
    return `<span class="word" data-w="${escA(m)}">${esc(m)}</span>`;
  });
}

// ══════════════════════════════
// WORD TOOLTIP
// ══════════════════════════════
const tooltip = document.getElementById('tooltip');
const ttWord = document.getElementById('tt-word');
const ttJp = document.getElementById('tt-jp');

async function onWordClick(e) {
  const span = e.target.closest('.word');
  if (!span) { tooltip.style.display='none'; return; }
  const word = span.dataset.w;
  ttWord.textContent = word;
  ttJp.textContent = '…';
  span.classList.add('looked-up');
  posTooltip(e);
  tooltip.style.display = 'block';

  const key = word.toLowerCase();
  if (wordCache[key]) { ttJp.textContent = wordCache[key]; return; }
  try {
    wordCache[key] = await translate(word, 'en', 'ja');
    ttJp.textContent = wordCache[key];
  } catch { ttJp.textContent = '取得失敗'; }
}

function posTooltip(e) {
  const x = e.clientX, y = e.clientY, w = 200, h = 65;
  let left = x + 12, top = y - h - 12;
  if (left + w > window.innerWidth - 8) left = x - w - 12;
  if (top < 8) top = y + 20;
  tooltip.style.left = left+'px'; tooltip.style.top = top+'px';
}

document.addEventListener('click', e => { if (!e.target.closest('.word')) tooltip.style.display='none'; });

// ══════════════════════════════
// JP TOGGLE
// ══════════════════════════════
function toggleJpAll() {
  const show = document.getElementById('jpToggle').checked;
  document.querySelectorAll('.jp-para').forEach(el => el.classList.toggle('visible', show));
}

// ══════════════════════════════
// BACK
// ══════════════════════════════
function showList() {
  document.getElementById('articleView').style.display = 'none';
  document.getElementById('listView').style.display = 'block';
  document.getElementById('backBtn').style.display = 'none';
  tooltip.style.display = 'none';
}

// ══════════════════════════════
// STATUS
// ══════════════════════════════
const statusBar = document.getElementById('statusBar');
function showStatus(msg) { statusBar.textContent = msg; statusBar.style.display = 'block'; }
function hideStatus() { statusBar.style.display = 'none'; }

// ══════════════════════════════
// UTILS
// ══════════════════════════════
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escA(s) { return String(s).replace(/"/g,'&quot;'); }
</script>
