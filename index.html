<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JP News in English</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Sans+JP:wght@300;400&display=swap');

:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #22263a;
  --accent: #6c8eff;
  --accent2: #a78bfa;
  --text: #e8eaf0;
  --muted: #7b82a0;
  --border: #2a2f45;
  --warn: #fbbf24;
  --sora: #ff6b35;
  --jt: #2196f3;
  --nhk: #00a8cc;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: "Inter", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

header {
  padding: 14px 18px; border-bottom: 1px solid var(--border);
  background: var(--surface); position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: 10px;
}
.logo { font-size: 16px; font-weight: 600; }
.logo span { color: var(--accent); }
#backBtn {
  display: none; margin-left: auto;
  background: var(--surface2); color: var(--muted);
  border: 1px solid var(--border); padding: 6px 14px;
  border-radius: 8px; cursor: pointer; font-size: 13px;
  font-family: "Inter", sans-serif; transition: all .2s;
}
#backBtn:hover { color: var(--text); border-color: var(--accent); }

.source-tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--surface); }
.src-btn {
  flex: 1; padding: 12px 0; font-size: 13px; font-weight: 500;
  font-family: "Inter", sans-serif; background: none; border: none;
  color: var(--muted); cursor: pointer; transition: all .2s;
  border-bottom: 2px solid transparent;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.src-dot { width: 7px; height: 7px; border-radius: 50%; }
.src-btn[data-src="sora"] .src-dot { background: var(--sora); }
.src-btn[data-src="jt"] .src-dot { background: var(--jt); }
.src-btn[data-src="nhk"] .src-dot { background: var(--nhk); }
.src-btn.active { color: var(--text); border-bottom-color: var(--accent); }

.cat-scroll {
  overflow-x: auto; padding: 10px 14px; gap: 7px;
  display: flex; background: var(--bg);
  border-bottom: 1px solid var(--border); scrollbar-width: none;
}
.cat-scroll::-webkit-scrollbar { display: none; }
.cat-btn {
  white-space: nowrap; background: var(--surface);
  border: 1px solid var(--border); color: var(--muted);
  padding: 5px 13px; border-radius: 20px; cursor: pointer;
  font-size: 12px; font-family: "Inter", sans-serif; transition: all .2s; flex-shrink: 0;
}
.cat-btn.active, .cat-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

.container { max-width: 800px; margin: 0 auto; padding: 18px 14px; }

#newsList { display: flex; flex-direction: column; gap: 10px; }
.news-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 15px 16px;
  cursor: pointer; transition: all .2s;
  display: flex; gap: 12px; align-items: flex-start;
}
.news-card:hover { border-color: var(--accent); background: var(--surface2); transform: translateY(-1px); }
.news-num { font-size: 11px; color: var(--accent); font-weight: 600; min-width: 20px; padding-top: 2px; }
.news-content { flex: 1; }
.news-title { font-size: 15px; font-weight: 500; line-height: 1.5; color: var(--text); }
.news-title.loading-t { color: var(--muted); font-style: italic; font-size: 13px; }
.news-meta { margin-top: 6px; font-size: 11px; color: var(--muted); }
.news-arrow { color: var(--muted); font-size: 18px; padding-top: 2px; transition: transform .2s; }
.news-card:hover .news-arrow { transform: translateX(4px); color: var(--accent); }

.loading { text-align: center; padding: 40px; color: var(--muted); }
.spinner {
  width: 32px; height: 32px; border: 3px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin .8s linear infinite; margin: 0 auto 14px;
}
@keyframes spin { to { transform: rotate(360deg); } }

#articleView { display: none; }
.art-header { margin-bottom: 22px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
.art-title { font-size: 22px; font-weight: 600; line-height: 1.4; margin-bottom: 8px; }
.art-meta { font-size: 11px; color: var(--muted); display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-top: 6px; }
.src-badge { display: inline-flex; align-items: center; gap: 4px; }
.src-badge-dot { width: 6px; height: 6px; border-radius: 50%; }

.jp-toggle-bar {
  display: flex; align-items: center; gap: 12px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; padding: 11px 15px; margin-bottom: 18px;
}
.jp-toggle-bar span { font-size: 13px; color: var(--muted); flex: 1; }
.toggle { position: relative; width: 40px; height: 22px; cursor: pointer; }
.toggle input { display: none; }
.t-track { width: 40px; height: 22px; background: var(--border); border-radius: 11px; display: block; transition: background .2s; }
.toggle input:checked + .t-track { background: var(--accent); }
.t-thumb { position: absolute; top: 3px; left: 3px; width: 16px; height: 16px; background: #fff; border-radius: 50%; transition: left .2s; pointer-events: none; }
.toggle input:checked ~ .t-thumb { left: 21px; }

.hint { font-size: 12px; color: var(--muted); margin-bottom: 16px; }
.hint strong { color: var(--accent); }

#articleBody { line-height: 1.9; }
.para-block { margin-bottom: 20px; }
.en-para { font-size: 15px; line-height: 1.9; color: var(--text); }
.jp-para {
  font-family: "Noto Sans JP", sans-serif; font-size: 12px;
  color: var(--muted); line-height: 1.8; margin-top: 6px;
  padding: 8px 12px; background: var(--surface2);
  border-left: 3px solid var(--accent2); border-radius: 0 8px 8px 0;
  display: none;
}
.jp-para.visible { display: block; }

.word { cursor: pointer; border-bottom: 1px dashed transparent; transition: all .15s; border-radius: 2px; padding: 0 1px; }
.word:hover { background: rgba(108,142,255,.15); border-bottom-color: var(--accent); color: #fff; }
.word.looked-up { border-bottom-color: var(--accent2); color: var(--accent2); }

#tooltip {
  position: fixed; background: #1e2235; border: 1px solid var(--accent);
  border-radius: 10px; padding: 10px 14px; font-size: 13px;
  max-width: 200px; z-index: 9999; display: none;
  box-shadow: 0 8px 32px rgba(0,0,0,.4); pointer-events: none;
}
#tt-word { font-weight: 600; color: var(--text); margin-bottom: 3px; }
#tt-jp { color: var(--accent2); font-family: "Noto Sans JP", sans-serif; font-size: 14px; }

.notice {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; padding: 14px 18px; font-size: 13px;
  color: var(--muted); margin-bottom: 16px; line-height: 1.6;
}
.notice strong { color: var(--warn); }
.retry-btn {
  background: var(--accent); color: #fff; border: none;
  padding: 8px 18px; border-radius: 8px; cursor: pointer;
  font-size: 13px; margin-top: 10px; font-family: "Inter", sans-serif;
}

#statusBar {
  position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 24px; padding: 9px 18px; font-size: 12px;
  color: var(--muted); display: none; z-index: 200;
  box-shadow: 0 4px 20px rgba(0,0,0,.4); white-space: nowrap;
}
</style>
</head>
<body>

<header>
  <div class="logo">JP <span>EN</span> News</div>
  <button id="backBtn" onclick="showList()">← Back</button>
</header>

<div class="source-tabs">
  <button class="src-btn active" data-src="sora" onclick="switchSource('sora')">
    <span class="src-dot"></span> SoraNews24
  </button>
  <button class="src-btn" data-src="jt" onclick="switchSource('jt')">
    <span class="src-dot"></span> Japan Today
  </button>
  <button class="src-btn" data-src="nhk" onclick="switchSource('nhk')">
    <span class="src-dot"></span> NHK World
  </button>
</div>

<div class="cat-scroll" id="catTabs"></div>

<div class="container">
  <div id="listView">
    <div id="newsList"><div class="loading"><div class="spinner"></div>Loading...</div></div>
  </div>

  <div id="articleView">
    <div class="art-header">
      <div class="art-title" id="artTitle"></div>
      <div class="art-meta">
        <span id="artDate"></span>
        <span class="src-badge"><span class="src-badge-dot" id="artDot"></span><span id="artSrc"></span></span>
      </div>
    </div>
    <div class="jp-toggle-bar">
      <span>Show Japanese translation</span>
      <label class="toggle">
        <input type="checkbox" id="jpToggle" onchange="toggleJpAll()">
        <span class="t-track"></span><span class="t-thumb"></span>
      </label>
    </div>
    <div class="hint">💡 <strong>Tap any word</strong> for Japanese translation</div>
    <div id="articleBody"></div>
  </div>
</div>

<div id="tooltip"><div id="tt-word"></div><div id="tt-jp"></div></div>
<div id="statusBar"></div>

<script>
const SOURCES = {
  sora: {
    name: 'SoraNews24', color: '#ff6b35',
    categories: [
      { label: 'All',          rss: 'https://soranews24.com/feed/' },
      { label: 'Entertainment',rss: 'https://soranews24.com/category/entertainment/feed/' },
      { label: 'Food',         rss: 'https://soranews24.com/category/food/feed/' },
      { label: 'Travel',       rss: 'https://soranews24.com/category/travel/feed/' },
      { label: 'Tech',         rss: 'https://soranews24.com/category/technology/feed/' },
      { label: 'Lifestyle',    rss: 'https://soranews24.com/category/lifestyle/feed/' },
    ]
  },
  jt: {
    name: 'Japan Today', color: '#2196f3',
    categories: [
      { label: 'All',          rss: 'https://japantoday.com/feed' },
      { label: 'News',         rss: 'https://japantoday.com/category/national/feed' },
      { label: 'Sports',       rss: 'https://japantoday.com/category/sports/feed' },
      { label: 'Tech',         rss: 'https://japantoday.com/category/tech/feed' },
      { label: 'Entertainment',rss: 'https://japantoday.com/category/entertainment/feed' },
      { label: 'World',        rss: 'https://japantoday.com/category/world/feed' },
    ]
  },
  nhk: {
    name: 'NHK World', color: '#00a8cc',
    categories: [
      { label: 'All',     rss: 'https://www3.nhk.or.jp/nhkworld/en/news/feeds/all/' },
      { label: 'Business',rss: 'https://www3.nhk.or.jp/nhkworld/en/news/feeds/business/' },
      { label: 'Politics',rss: 'https://www3.nhk.or.jp/nhkworld/en/news/feeds/politics/' },
      { label: 'Science', rss: 'https://www3.nhk.or.jp/nhkworld/en/news/feeds/science/' },
      { label: 'Sports',  rss: 'https://www3.nhk.or.jp/nhkworld/en/news/feeds/sports/' },
      { label: 'Culture', rss: 'https://www3.nhk.or.jp/nhkworld/en/news/feeds/culture/' },
    ]
  }
};

const PROXIES = [
  'https://corsproxy.io/?',
  'https://api.allorigins.win/raw?url=',
  'https://thingproxy.freeboard.io/fetch/',
];
let proxyIdx = 0;

async function fetchProxy(url) {
  for (let i = 0; i < PROXIES.length; i++) {
    try {
      const p = PROXIES[(proxyIdx + i) % PROXIES.length];
      const ctrl = new AbortController();
      const t = setTimeout(() => ctrl.abort(), 9000);
      const res = await fetch(p + encodeURIComponent(url), { signal: ctrl.signal });
      clearTimeout(t);
      if (res.ok) { proxyIdx = (proxyIdx + i) % PROXIES.length; return res; }
    } catch(e) {}
  }
  throw new Error('Connection failed. Please retry.');
}

const GROQ_KEY = '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';
const tCache = {};

async function translate(text, from='en', to='ja') {
  const key = `${from}|${to}|${text}`;
  if (tCache[key]) return tCache[key];
  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${GROQ_KEY}` },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        max_tokens: 512,
        messages: [{
          role: 'user',
          content: from === 'en'
            ? `Translate the following English text to Japanese. Output only the translation, nothing else:\n\n${text}`
            : `Translate the following Japanese text to English. Output only the translation, nothing else:\n\n${text}`
        }]
      })
    });
    const d = await res.json();
    const result = d.choices?.[0]?.message?.content?.trim() || text;
    return tCache[key] = result;
  } catch { return tCache[key] = text; }
}

let currentSrc = 'sora', currentCat = 0, articles = [];
const wordCache = {};

window.onload = () => { buildCatTabs('sora'); loadFeed(); };

function switchSource(src) {
  if (currentSrc === src) return;
  currentSrc = src; currentCat = 0;
  document.querySelectorAll('.src-btn').forEach(b => b.classList.toggle('active', b.dataset.src === src));
  buildCatTabs(src); loadFeed();
}

function buildCatTabs(src) {
  const bar = document.getElementById('catTabs');
  bar.innerHTML = '';
  SOURCES[src].categories.forEach((cat, i) => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (i === 0 ? ' active' : '');
    btn.textContent = cat.label;
    btn.onclick = () => {
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active'); currentCat = i; loadFeed();
    };
    bar.appendChild(btn);
  });
}

async function loadFeed() {
  const list = document.getElementById('newsList');
  list.innerHTML = '<div class="loading"><div class="spinner"></div>Loading...</div>';
  articles = [];
  const cat = SOURCES[currentSrc].categories[currentCat];
  try {
    const res = await fetchProxy(cat.rss);
    const text = await res.text();
    const xml = new DOMParser().parseFromString(text, 'text/xml');
    const items = xml.querySelectorAll('item');
    if (items.length === 0) throw new Error('No articles found');

    articles = Array.from(items).slice(0, 30).map((item, i) => {
      const title = item.querySelector('title')?.textContent?.replace(/<![CDATA[|]]>/g,'').trim() || '';
      const link = item.querySelector('link')?.textContent?.trim() || '';
      const pubDate = item.querySelector('pubDate')?.textContent || '';
      const desc = (item.querySelector('description')?.textContent || '')
        .replace(/<![CDATA[|]]>/g,'').replace(/<[^>]+>/g,'').trim();
      return { title, link, pubDate, desc, index: i };
    });

    renderList();
  } catch(e) {
    list.innerHTML = `<div class="notice"><strong>⚠️ Failed to load</strong><br>${e.message}<br>
      <button class="retry-btn" onclick="loadFeed()">🔄 Retry</button></div>`;
  }
}

function renderList() {
  const list = document.getElementById('newsList');
  list.innerHTML = '';
  articles.forEach((a, i) => {
    const date = a.pubDate ? new Date(a.pubDate).toLocaleDateString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '';
    const card = document.createElement('div');
    card.className = 'news-card';
    card.innerHTML = `
      <div class="news-num">${String(i+1).padStart(2,'0')}</div>
      <div class="news-content">
        <div class="news-title">${esc(a.title)}</div>
        <div class="news-title-jp" id="title-jp-${i}" style="font-family:'Noto Sans JP',sans-serif;font-size:12px;color:var(--muted);margin-top:4px;line-height:1.5;">訳中...</div>
        <div class="news-meta">📅 ${date}</div>
      </div>
      <div class="news-arrow">›</div>`;
    card.onclick = () => openArticle(i);
    list.appendChild(card);

    // バックグラウンドでタイトル和訳
    translate(a.title).then(jp => {
      a.titleJp = jp;
      const el = document.getElementById(`title-jp-${i}`);
      if (el) el.textContent = jp;
    });
  });
}

async function openArticle(idx) {
  const a = articles[idx];
  document.getElementById('listView').style.display = 'none';
  document.getElementById('articleView').style.display = 'block';
  document.getElementById('backBtn').style.display = 'block';
  document.getElementById('jpToggle').checked = false;
  document.getElementById('artTitle').textContent = a.title;
  document.getElementById('artDate').textContent = a.pubDate ? new Date(a.pubDate).toLocaleString('en-US') : '';
  // 記事ヘッダーに和訳タイトル表示
  let artTitleJp = document.getElementById('artTitleJp');
  if (!artTitleJp) {
    artTitleJp = document.createElement('div');
    artTitleJp.id = 'artTitleJp';
    artTitleJp.style.cssText = 'font-family:"Noto Sans JP",sans-serif;font-size:13px;color:var(--muted);margin-top:6px;line-height:1.6;';
    document.getElementById('artTitle').after(artTitleJp);
  }
  artTitleJp.textContent = a.titleJp || '訳中...';
  if (!a.titleJp) translate(a.title).then(jp => { a.titleJp = jp; artTitleJp.textContent = jp; });
  const src = SOURCES[currentSrc];
  document.getElementById('artDot').style.background = src.color;
  document.getElementById('artSrc').textContent = src.name;
  document.getElementById('articleBody').innerHTML = '<div class="loading"><div class="spinner"></div>Loading article...</div>';
  window.scrollTo(0,0);

  try {
    let paras = [];
    const NOISE = /^(Share|Tweet|Facebook|Twitter|Instagram|Subscribe|Newsletter|Copyright|All rights|Tags:|Filed under|Related|Read more|Advertisement|Click here)/i;

    // フェッチして本文取得（英語サイトなので文字化けなし）
    try {
      const res = await fetchProxy(a.link);
      const html = await res.text();
      const doc = new DOMParser().parseFromString(html, 'text/html');
      const selectors = [
        '.entry-content p', '.post-content p', '.article-content p',
        '.story-body p', '.article-body p', '.content p',
        'article p', 'main p',
      ];
      for (const sel of selectors) {
        const els = doc.querySelectorAll(sel);
        const texts = Array.from(els)
          .map(el => el.textContent.trim())
          .filter(t => t.length > 30 && !t.match(NOISE));
        if (texts.length >= 2) { paras = texts.slice(0, 20); break; }
      }
    } catch(e) {}

    // フォールバック: RSSのdescription
    if (paras.length < 2 && a.desc) paras = [a.desc];
    if (paras.length === 0) throw new Error('Could not load article content');

    showStatus(`Translating 0/${paras.length}`);
    const translated = [];
    for (let i = 0; i < paras.length; i++) {
      const jp = await translate(paras[i]);
      translated.push({ en: paras[i], jp });
      showStatus(`Translating ${i+1}/${paras.length}`);
    }
    hideStatus();
    renderArticle(translated);
  } catch(e) {
    hideStatus();
    document.getElementById('articleBody').innerHTML =
      `<div class="notice"><strong>⚠️ Failed</strong><br>${e.message}</div>`;
  }
}

function renderArticle(paras) {
  const body = document.getElementById('articleBody');
  body.innerHTML = '';
  paras.forEach(p => {
    const block = document.createElement('div');
    block.className = 'para-block';
    const enDiv = document.createElement('div');
    enDiv.className = 'en-para';
    enDiv.innerHTML = clickable(p.en);
    const jpDiv = document.createElement('div');
    jpDiv.className = 'jp-para';
    jpDiv.textContent = p.jp;
    block.append(enDiv, jpDiv);
    body.appendChild(block);
  });
  body.addEventListener('click', onWordClick);
}

function clickable(text) {
  return text.replace(/([a-zA-Z''-]+)/g, m => {
    if (m.replace(/[^a-zA-Z]/g,'').length < 2) return m;
    return `<span class="word" data-w="${escA(m)}">${esc(m)}</span>`;
  });
}

const tooltip = document.getElementById('tooltip');
async function onWordClick(e) {
  const span = e.target.closest('.word');
  if (!span) { tooltip.style.display='none'; return; }
  const word = span.dataset.w;
  document.getElementById('tt-word').textContent = word;
  document.getElementById('tt-jp').textContent = '…';
  span.classList.add('looked-up');
  posTooltip(e); tooltip.style.display='block';
  const key = word.toLowerCase();
  if (wordCache[key]) { document.getElementById('tt-jp').textContent = wordCache[key]; return; }
  try {
    wordCache[key] = await translate(word);
    document.getElementById('tt-jp').textContent = wordCache[key];
  } catch { document.getElementById('tt-jp').textContent = 'N/A'; }
}
function posTooltip(e) {
  const x=e.clientX,y=e.clientY,w=200,h=65;
  let left=x+12,top=y-h-12;
  if(left+w>window.innerWidth-8)left=x-w-12;
  if(top<8)top=y+20;
  tooltip.style.left=left+'px';tooltip.style.top=top+'px';
}
document.addEventListener('click',e=>{if(!e.target.closest('.word'))tooltip.style.display='none';});

function toggleJpAll() {
  const show = document.getElementById('jpToggle').checked;
  document.querySelectorAll('.jp-para').forEach(el=>el.classList.toggle('visible',show));
}

function showList() {
  document.getElementById('articleView').style.display='none';
  document.getElementById('listView').style.display='block';
  document.getElementById('backBtn').style.display='none';
  tooltip.style.display='none';
}

const statusBar = document.getElementById('statusBar');
function showStatus(msg){statusBar.textContent=msg;statusBar.style.display='block';}
function hideStatus(){statusBar.style.display='none';}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function escA(s){return String(s).replace(/"/g,'&quot;');}
</script>
</body>
</html>
